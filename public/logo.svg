<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F2344;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" floodOpacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="97" fill="url(#grad1)" filter="url(#shadow)"/>
  
  <!-- Outer gold ring -->
  <circle cx="100" cy="100" r="97" stroke="url(#grad2)" strokeWidth="2" fill="none" opacity="0.7"/>

  <!-- Temple/Dome roof - Premium style -->
  <path d="M 50 120 L 100 40 L 150 120 Z" fill="url(#grad2)" stroke="#F59E0B" strokeWidth="2"/>

  <!-- Main building body -->
  <rect x="60" y="120" width="80" height="60" fill="url(#grad1)" stroke="#FCD34D" strokeWidth="1.5" opacity="0.95"/>

  <!-- Center door - Gold -->
  <rect x="85" y="145" width="30" height="35" fill="url(#grad2)" rx="3"/>
  <circle cx="110" cy="160" r="3" fill="#1E3A8A" opacity="0.8"/>

  <!-- Left column windows -->
  <rect x="68" y="128" width="12" height="12" fill="#FCD34D" stroke="#1E3A8A" strokeWidth="1" opacity="0.9"/>
  <rect x="68" y="152" width="12" height="12" fill="#FCD34D" stroke="#1E3A8A" strokeWidth="1" opacity="0.9"/>

  <!-- Right column windows -->
  <rect x="120" y="128" width="12" height="12" fill="#FCD34D" stroke="#1E3A8A" strokeWidth="1" opacity="0.9"/>
  <rect x="120" y="152" width="12" height="12" fill="#FCD34D" stroke="#1E3A8A" strokeWidth="1" opacity="0.9"/>

  <!-- Flag pole -->
  <line x1="100" y1="40" x2="100" y2="20" stroke="#FCD34D" strokeWidth="3"/>

  <!-- Flag -->
  <path d="M 100 20 L 125 30 L 100 40 Z" fill="url(#grad2)" stroke="#F59E0B" strokeWidth="1"/>

  <!-- Bottom accent line -->
  <line x1="60" y1="180" x2="140" y2="180" stroke="#FCD34D" strokeWidth="3" opacity="0.8"/>

  <!-- Book icons - bottom decoration -->
  <rect x="45" y="184" width="18" height="8" fill="url(#grad2)" rx="1" opacity="0.8"/>
  <rect x="91" y="184" width="18" height="8" fill="url(#grad1)" rx="1" opacity="0.8"/>
  <rect x="137" y="184" width="18" height="8" fill="url(#grad2)" rx="1" opacity="0.8"/>

  <!-- Star accents -->
  <circle cx="35" cy="60" r="2" fill="#FCD34D" opacity="0.6"/>
  <circle cx="165" cy="70" r="2" fill="#FCD34D" opacity="0.6"/>
  <circle cx="40" cy="140" r="1.5" fill="#FCD34D" opacity="0.4"/>
  <circle cx="160" cy="150" r="1.5" fill="#FCD34D" opacity="0.4"/>
</svg>